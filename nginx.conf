server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Backend proxy — API, OTLP ingestion, and Swagger docs
    # BACKEND_HOST is the hostname of the backend container.
    # When running via `docker run --network observability-net`, set this to the
    # backend container name (default: observability-backend).
    # Overridden at build-time via: --build-arg BACKEND_HOST=<name>
    # -------------------------------------------------------------------------

    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /otlp/ {
        proxy_pass         http://backend:8080/otlp/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /swagger/ {
        proxy_pass         http://backend:8080/swagger/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # React SPA — serve index.html for all other routes (client-side routing)
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
