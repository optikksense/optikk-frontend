name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  checks:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack (Yarn from packageManager)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: yarn type-check

#      - name: Lint
#        run: yarn lint

      - name: Marketing assets gate (SVG-only)
        run: yarn ci:marketing-assets

      - name: Build
        run: yarn build

      - name: Bundle size budgets
        run: yarn ci:budgets

      - name: Bundle Size Diff
        if: github.event_name == 'pull_request'
        uses: preactjs/compressed-size-action@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          install-script: "yarn install --frozen-lockfile"
          build-script: "build"
          pattern: "./dist/assets/*.{js,css}"
          minimum-change-threshold: 100
