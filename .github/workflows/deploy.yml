name: Deploy to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required to count commits since VERSION last changed

      # MAJOR.MINOR come from the repo-root VERSION file; PATCH auto-bumps by
      # the number of commits since VERSION was last touched. Bump VERSION to
      # start a new MINOR/MAJOR series.
      - name: Resolve version
        id: v
        run: |
          IFS=. read -r MAJOR MINOR BASE_PATCH <<< "$(tr -d '[:space:]' < VERSION)"
          VERSION_SHA="$(git log -n 1 --format=%H -- VERSION)"
          SINCE="$(git rev-list --count "${VERSION_SHA}..HEAD")"
          echo "tag=${MAJOR}.${MINOR}.$(( BASE_PATCH + SINCE ))" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.v.outputs.tag }}
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.v.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
