name: Deploy to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ghcr.io requires lowercase paths; github.repository keeps org casing (e.g. Optikk-Org).
      - name: Image name (lowercase)
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image tags:
      #   latest                       — always moves with main (rolling)
      #   <VERSION>                    — semver from repo-root VERSION (rolling; bump the file for 1.0.1, etc.)
      #   <VERSION>-<shortSha>         — immutable per-commit tag (every push is uniquely addressable)
      #   sha-<shortSha>               — explicit commit tag (convenient for git-sha-based deploys)
      - name: Resolve image version
        id: version
        run: |
          if [[ ! -f VERSION ]]; then
            echo "::error::Missing repo-root VERSION file. Add VERSION containing one line like 1.0.0 (same commit as this workflow)."
            exit 1
          fi
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION must be MAJOR.MINOR.PATCH (e.g. 1.0.1), got: $VERSION"
            exit 1
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version_sha=${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.version.outputs.short_sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_SHA: ${{ steps.version.outputs.version_sha }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          {
            echo "### Published tags"
            echo ""
            echo "- \`${REGISTRY}/${IMAGE_NAME}:latest\` (rolling)"
            echo "- \`${REGISTRY}/${IMAGE_NAME}:${VERSION}\` (rolling semver)"
            echo "- \`${REGISTRY}/${IMAGE_NAME}:${VERSION_SHA}\` (immutable per-commit)"
            echo "- \`${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}\` (commit tag)"
          } >> "$GITHUB_STEP_SUMMARY"
